# Recreate this environment with either:
#   mamba env create -f env.yml
# or
#   conda env create -f env.yml
#
# Update an existing env in place:
#   mamba env update -n lpsch -f env.yml --prune
# or
#   conda env update -n lpsch -f env.yml --prune
#
# Note: This file pins top-level conda packages and all pip packages exactly.
# Low-level compiled conda dependencies are resolved per-platform (macOS vs Linux).

name: lpsch
channels:
  - conda-forge
dependencies:
  - python=3.14.3
  - pip=26.0.1
  - galois=0.4.10
  - notebook=7.5.3
  - numpy=2.3.5
  - rustworkx=0.17.1
  - z3-solver=4.15.7.0
  - pip:
      - PyMatching==2.3.1
      - contourpy==1.3.3
      - cycler==0.12.1
      - dill==0.4.1
      - fonttools==4.61.1
      - gurobipy==13.0.1
      - iniconfig==2.3.0
      - kiwisolver==1.4.9
      - ldpc==2.4.1
      - matplotlib==3.10.8
      - networkx==3.6.1
      - pillow==12.1.0
      - pluggy==1.6.0
      - pyparsing==3.3.2
      - pytest==9.0.2
      - qiskit==2.3.0
      - scipy==1.17.0
      - sinter==1.15.0
      - stevedore==5.7.0
      - stim==1.15.0
      - tqdm==4.67.3
